<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>北大树洞 · 夜话集</title>
    <script>
      // 在首帧前定主题，避免昼/夜闪烁（FOUC）。默认昼模式，用户切换后记忆其选择。
      (function () {
        try {
          var t = localStorage.getItem("treehole-theme");
          if (t !== "day" && t !== "night") t = "day";
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = "day";
        }
      })();
    </script>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-screen-webfont@1.7.0/lxgwwenkaiscreen.css"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>
    <div class="rings" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>

    <div class="page">
      <header class="masthead">
        <div class="masthead-top">
          <div class="emblem" aria-hidden="true">
            <svg viewBox="0 0 64 64" role="img">
              <g fill="none" stroke="currentColor" stroke-width="1.4">
                <circle cx="32" cy="32" r="29" opacity="0.35" />
                <circle cx="32" cy="32" r="23" opacity="0.5" />
                <circle cx="32" cy="32" r="17" opacity="0.7" />
                <circle cx="32" cy="32" r="11" opacity="0.85" />
              </g>
              <ellipse cx="32" cy="33" rx="5.5" ry="7" fill="currentColor" />
            </svg>
          </div>
          <div class="nameplate">
            <p class="eyebrow">PKU TREEHOLE · 夜 话 集</p>
            <h1 class="title">北大树洞<span class="title-mark">热榜</span></h1>
            <p id="statusLine" class="status-line">等待首次抓取</p>
          </div>
          <div class="masthead-side">
            <button id="themeToggle" class="theme-toggle" type="button" aria-label="切换昼夜模式" aria-pressed="false">
              <span class="theme-toggle-icon" aria-hidden="true">☾</span>
              <span class="theme-toggle-label">夜</span>
            </button>
            <p class="dateline"><span id="editionDate">—</span></p>
            <p class="byline">辑录 · 祈愿的猫</p>
            <a
              class="repo-link"
              href="https://github.com/WishingCat/treehole-hot-rank"
              target="_blank"
              rel="noreferrer"
              >GitHub 卷宗 ↗</a
            >
          </div>
        </div>
        <div class="masthead-rule" aria-hidden="true">
          <span></span><i></i><span></span>
        </div>
      </header>

      <nav class="indexbar" aria-label="栏目与筛选">
        <div class="indexbar-row">
          <div class="tabs" role="group" aria-label="栏目">
            <button id="realtimeBtn" class="tab" type="button">实时</button>
            <button id="hotBtn" class="tab active" type="button">热榜</button>
            <button id="archiveBtn" class="tab" type="button">历史</button>
            <button id="deletedBtn" class="tab" type="button">被删帖</button>
          </div>
          <label class="search">
            <svg class="search-icon" viewBox="0 0 20 20" aria-hidden="true">
              <circle cx="9" cy="9" r="6" fill="none" stroke="currentColor" stroke-width="1.6" />
              <line x1="13.5" y1="13.5" x2="18" y2="18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
            </svg>
            <input id="searchInput" type="search" placeholder="检索 #编号 · 关键词 · 标签" />
          </label>
        </div>
        <div class="toolbar">
          <div class="slot">
            <span class="slot-label">时段</span>
            <div class="slot-body">
              <div id="windowControl" class="seg" role="group" aria-label="热榜周期">
                <button class="seg-btn" data-window="hour" type="button">小时榜</button>
                <button class="seg-btn active" data-window="day" type="button">日榜</button>
                <button class="seg-btn" data-window="week" type="button">周榜</button>
              </div>
              <label id="monthField" class="field" hidden>
                <select id="monthSelect" aria-label="选择归档月份">
                  <option value="">请选择月份</option>
                </select>
              </label>
              <div id="rangeField" class="field range" hidden>
                <input id="rangeStart" type="date" aria-label="开始日期" />
                <span class="range-dash" aria-hidden="true">—</span>
                <input id="rangeEnd" type="date" aria-label="结束日期" />
                <button id="rangeClear" type="button" class="range-clear" aria-label="清空日期范围">×</button>
              </div>
              <span id="scopeStatic" class="locked" hidden></span>
            </div>
          </div>
          <div class="slot">
            <span class="slot-label">排序</span>
            <div class="slot-body">
              <div id="sortControl" class="seg" role="group" aria-label="排序">
                <button class="seg-btn" data-sort="reply" type="button">回复</button>
                <button class="seg-btn active" data-sort="follow" type="button">关注</button>
              </div>
              <span id="sortStatic" class="locked" hidden>时间倒序 · 固定</span>
            </div>
          </div>
        </div>
      </nav>

      <main class="stage">
        <section class="ledger" aria-live="polite">
          <div class="ledger-head">
            <div class="ledger-headings">
              <h2 id="listTitle">日榜 · 关注数</h2>
              <p id="listMeta">正在读取缓存</p>
            </div>
            <div id="sampleCount" class="tally">0 条</div>
          </div>
          <div id="emptyState" class="empty" hidden>
            <div class="empty-mark" aria-hidden="true"></div>
            <h3>洞中暂无回响</h3>
            <p>后台仍在持续聆听，新的夜话会自动归入此处。</p>
          </div>
          <div id="postList" class="entries"></div>
          <div class="ledger-foot">
            <button id="loadMoreBtn" class="more" type="button" hidden>继续翻阅</button>
          </div>
        </section>

        <aside class="almanac">
          <div class="almanac-card">
            <h2 class="almanac-title">本期札记</h2>
            <dl class="figures">
              <div><dt>近 1 时</dt><dd id="hourCount">0</dd></div>
              <div><dt>近 24 时</dt><dd id="dayCount">0</dd></div>
              <div><dt>近 7 日</dt><dd id="weekCount">0</dd></div>
              <div><dt>夜话总藏</dt><dd id="cacheCount">0</dd></div>
              <div><dt>留言缓存</dt><dd id="commentCount">0</dd></div>
              <div><dt>抓取页数</dt><dd id="pageCount">0</dd></div>
            </dl>
            <div class="notes">
              <p><span>最近成功</span><strong id="lastSuccess">尚未成功</strong></p>
              <p><span>登录来源</span><strong id="authSource">未确认</strong></p>
              <p><span>抓取调度</span><strong id="intervalText">每到整点</strong></p>
              <p id="errorLine" class="error-line" hidden></p>
            </div>
          </div>
        </aside>
      </main>

      <footer class="colophon">
        <span>北大树洞 · 夜话集</span>
        <span class="dot" aria-hidden="true">·</span>
        <span>仅供校内浏览 · 数据本地归档</span>
      </footer>
    </div>

    <div id="detailDialog" class="reader" hidden>
      <article class="reader-page" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
        <button id="detailClose" class="reader-close" type="button" aria-label="合上">×</button>
        <div id="detailContent"></div>
      </article>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
